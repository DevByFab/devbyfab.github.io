name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: games/infinite-botnet-reboot/package-lock.json

      - name: Install reboot dependencies
        run: npm ci --prefix games/infinite-botnet-reboot

      - name: Build reboot
        run: VITE_PUBLIC_BASE=/games/infinite-botnet-reboot/ npm run build --prefix games/infinite-botnet-reboot

      - name: Verify reboot build entrypoint
        run: |
          set -euo pipefail
          test -f games/infinite-botnet-reboot/dist/index.html
          if grep -Eq '<script[^>]+src=["'"']/src/main\.tsx["'"']' games/infinite-botnet-reboot/dist/index.html; then
            echo 'ERROR: dist/index.html still contains script src="/src/main.tsx" (unbuilt entrypoint).'
            exit 1
          fi

      - name: Assemble Pages artifact
        run: |
          set -euo pipefail
          mkdir -p .pages-out

          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'games/infinite-botnet-reboot/' \
            ./ .pages-out/

          mkdir -p .pages-out/games/infinite-botnet-reboot
          cp -a games/infinite-botnet-reboot/dist/. .pages-out/games/infinite-botnet-reboot/
          touch .pages-out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
