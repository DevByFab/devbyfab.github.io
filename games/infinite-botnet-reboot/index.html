<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>infinite-botnet-reboot</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: #0b1220;
        color: #e9edf8;
        font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
      }

      .boot-shell {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .boot-card {
        width: min(780px, 100%);
        background: #141f33;
        border: 1px solid #2a3f67;
        border-radius: 14px;
        padding: 20px 22px;
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.32);
      }

      .boot-card h1 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }

      .boot-card p {
        margin: 0;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="boot-shell">
        <section class="boot-card">
          <h1>Infinite BotNet Reboot</h1>
          <p>Loading session...</p>
        </section>
      </main>
    </div>
    <script>
      window.__IBR_BOOT_OK__ = false;
      window.__IBR_BOOT_ERROR__ = '';
      window.__IBR_RAW_SOURCE_MODE__ = false;

      window.addEventListener('error', (event) => {
        const message = typeof event.message === 'string' && event.message.length > 0
          ? event.message
          : 'Unknown script error';
        const file = typeof event.filename === 'string' && event.filename.length > 0
          ? event.filename
          : 'unknown file';
        const composed = `${message} (${file})`;
        window.__IBR_BOOT_ERROR__ = composed;

        if (file.includes('/src/main.tsx') || composed.includes('/src/main.tsx')) {
          window.__IBR_RAW_SOURCE_MODE__ = true;
        }
      });

      window.addEventListener('unhandledrejection', (event) => {
        const reason = event.reason;
        if (typeof reason === 'string') {
          window.__IBR_BOOT_ERROR__ = reason;
          return;
        }

        if (reason && typeof reason.message === 'string' && reason.message.length > 0) {
          window.__IBR_BOOT_ERROR__ = reason.message;
          return;
        }

        window.__IBR_BOOT_ERROR__ = 'Unhandled promise rejection during bootstrap';
      });

      window.setTimeout(() => {
        if (window.__IBR_BOOT_OK__) return;

        const root = document.getElementById('root');
        if (!root) return;

        const bootError = window.__IBR_BOOT_ERROR__
          ? `<p style="margin-top: 8px;"><strong>Detected error:</strong> ${window.__IBR_BOOT_ERROR__.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>`
          : '';

        const rawSourceHint = window.__IBR_RAW_SOURCE_MODE__
          ? '<p style="margin-top: 8px;"><strong>Diagnosis:</strong> GitHub Pages is serving source files instead of the built Vite artifact.</p>'
          : '';

        root.innerHTML = `
          <main class="boot-shell">
            <section class="boot-card">
              <h1>Infinite BotNet Reboot</h1>
              <p>The app bundle did not boot.</p>
              <p style="margin-top: 8px;">If this persists: check GitHub Pages settings and set Source to <strong>GitHub Actions</strong> (not Deploy from branch), then push again.</p>
              ${rawSourceHint}
              ${bootError}
            </section>
          </main>
        `;
      }, 4000);
    </script>
    <script id="ibr-entry-script" type="module" src="/src/main.tsx"></script>
    <script>
      const entryScript = document.getElementById('ibr-entry-script');
      if (entryScript) {
        entryScript.addEventListener('error', () => {
          window.__IBR_RAW_SOURCE_MODE__ = true;
          if (!window.__IBR_BOOT_ERROR__) {
            window.__IBR_BOOT_ERROR__ = 'Failed to load /src/main.tsx (404)';
          }
        });
      }
    </script>
  </body>
</html>
