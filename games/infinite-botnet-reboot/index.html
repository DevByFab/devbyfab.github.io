<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>infinite-botnet-reboot</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
    <script>
      // Show a helpful local-preview hint only if the app did not mount.
      window.setTimeout(() => {
        const root = document.getElementById('root');
        if (!root) return;
        if (root.childElementCount > 0 || root.textContent.trim().length > 0) return;

        root.innerHTML = `
          <main style="min-height: 100dvh; display: grid; place-items: center; padding: 24px; background: #0f1218; color: #f2f5fb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
            <section style="width: min(760px, 100%); background: #171d28; border: 1px solid #273247; border-radius: 14px; padding: 20px 22px; box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);">
              <h1 style="margin: 0 0 12px; font-size: 1.5rem; line-height: 1.25;">Infinite BotNet Reboot</h1>
              <p style="margin: 0 0 10px; line-height: 1.55;">
                Si cette page apparait dans Live Preview, c'est normal: la version reboot (React + TypeScript + worker)
                doit etre lancee via Vite.
              </p>
              <p style="margin: 0 0 10px; line-height: 1.55;">Depuis la racine du repo:</p>
              <pre style="margin: 0 0 10px; padding: 12px; border-radius: 10px; background: #0d1118; border: 1px solid #273247; overflow-x: auto;"><code>cd games/infinite-botnet-reboot
npm install
npm run dev</code></pre>
              <p style="margin: 0; line-height: 1.55;">
                Ouvre ensuite l'URL affichee par Vite (souvent
                <a href="http://localhost:5173/" style="color: #6dc8ff;">http://localhost:5173/</a>). En production GitHub Pages,
                les visiteurs n'ont rien a installer: le build est deja publie.
              </p>
            </section>
          </main>
        `;
      }, 1200);
    </script>
    <noscript>
      <main style="min-height: 100dvh; display: grid; place-items: center; padding: 24px; background: #0f1218; color: #f2f5fb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
        <section style="width: min(760px, 100%); background: #171d28; border: 1px solid #273247; border-radius: 14px; padding: 20px 22px; box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);">
          <h1 style="margin: 0 0 12px; font-size: 1.5rem; line-height: 1.25;">Infinite BotNet Reboot</h1>
          <p style="margin: 0; line-height: 1.55;">JavaScript doit etre active pour lancer le jeu.</p>
        </section>
      </main>
    </noscript>
  </body>
</html>
