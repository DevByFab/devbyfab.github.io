<head>

  <title>Contact — DevByFab</title>
  <link rel="icon" type="image/png" href="img/Logo_Sans_Fond.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">
        <img src="img/Logo_Sans_Fond.png" alt="DevByFab Logo" style="height:48px;width:auto;object-fit:contain;">
      </a>
      <button class="burger-menu" aria-label="Open menu">
        <span class="burger-lines">
          <span></span><span></span><span></span>
        </span>
      </button>
      <div class="nav-center">
        <ul>
          <li><a href="index.html" data-i18n="nav.home">Home</a></li>
          <li><a href="about.html" data-i18n="nav.about">About</a></li>
          <li><a href="projects.html" data-i18n="nav.projects">Projects</a></li>
          <li><a href="contact.html" class="active" data-i18n="nav.contact">Contact</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main>
    <!-- Hero -->
    <section class="page-hero">
      <h1 data-i18n="contact.title">Contact</h1>
      <p class="page-hero__subtitle" data-i18n="contact.subtitle">A question, an idea, a collaboration? Get in touch.</p>
    </section>

    <!-- Contact Card -->
    <section class="contact-grid">
      <article class="project-card project-card--contact">
        <div class="project-card__body">
          <div class="contact-item">
            <span class="contact-item__icon">✉️</span>
            <div class="contact-item__info">
              <h3 data-i18n="contact.emailLabel">Email</h3>
              <a href="mailto:devbyfab@gmail.com">devbyfab@gmail.com</a>
            </div>
          </div>
          <div class="contact-item">
            <span class="contact-item__icon">💬</span>
            <div class="contact-item__info">
              <h3>Discord</h3>
              <span class="discord-tag">devbyfab</span>
            </div>
          </div>
          <div class="contact-item">
            <span class="contact-item__icon">🐙</span>
            <div class="contact-item__info">
              <h3>GitHub</h3>
              <a href="https://github.com/devbyfab" target="_blank" rel="noopener">github.com/devbyfab</a>
            </div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <div id="bg-anim"></div>
  <footer>
    <div class="footer-separator"></div>
    <div class="footer-content">
      <div>
        <span>Email : <a href="mailto:devbyfab@gmail.com">devbyfab@gmail.com</a></span>
        <span>· Discord : <span class="discord-tag">devbyfab</span></span>
        <span>· <a href="https://github.com/devbyfab" target="_blank" rel="noopener">GitHub</a></span>
      </div>
      <div class="footer-copy">
        &copy; DevByFab 2026. <span data-i18n="footer.rights">All rights reserved.</span>
        <span> · <a href="legal.html" data-i18n="footer.legal">Legal Notice</a></span>
      </div>
    </div>
  </footer>
  <script src="js/main.js"></script>
  <script src="js/i18n.js"></script>
</body>
</html>
